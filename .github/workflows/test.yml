name: tests
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      # FACED is gated and obtained separately; without it these tests SKIP by
      # design rather than fail. CI proves the code imports and the harness runs.
      - run: pytest spikes/ -q -rs
